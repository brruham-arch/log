name: Build AML Mod

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NDK r25c
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Build
        run: |
          $ANDROID_NDK_ROOT/ndk-build \
            NDK_PROJECT_PATH=. \
            APP_BUILD_SCRIPT=./jni/Android.mk \
            NDK_APPLICATION_MK=./jni/Application.mk

      - name: Verify
        run: |
          ls -lh libs/armeabi-v7a/
          file libs/armeabi-v7a/*.so
          $ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-nm \
            -D libs/armeabi-v7a/*.so | grep " T "

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: keylogger-arm32
          path: libs/armeabi-v7a/*.so
          retention-days: 7
